name: Bug 反馈
description: 在使用 ClassIsland 的过程中遇到了 Bug。
labels: ["Bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您进行 Bug 反馈。
        反馈时请在上面的文本框⬆️起一个能够清晰描述您的问题的标题，便于开发者解决您的问题。
        
        如果您不知道如何有效、精准地表述，我们建议您先阅读《提问的智慧》（[链接](https://github.com/ryanhanwu/How-To-Ask-Questions-The-Smart-Way/blob/main/README-zh_CN.md)）。
        
        ## 在开始之前，请先检查：
        
        - 我已经在 [Issues](https://github.com/ClassIsland/ClassIsland/issues?q=label%3ABug) 中找过我要提出的问题，没有找到相同问题的 Issue。
        - 我已确认我要反馈的问题还没有在 [dev](https://github.com/ClassIsland/ClassIsland/commits/dev/) 分支上修复。
        - 我已知晓并同意，此处仅用于汇报程序中存在的问题。若这个 Issue 是关于其他非程序本身问题，则我的 Issue 可能会被无条件自动关闭或/并锁定。（这些问题应当在 Discussion 板块提出。）
        - 我使用的系统版本为 Windows 10 / 11（开发者可能[不会受理 Windows 7 系统相关问题](https://docs.classisland.tech/zh-cn/latest/app/setup/#检查系统需求)）
  - type: markdown
    attributes: 
      value: |
        ## Bug 信息

        描述您遇到的 Bug。您可以附上截图、录屏、堆栈跟踪、日志等材料，便于开发者追踪问题。
  - type: textarea
    id: reproduce-steps
    attributes:
      label: 重现步骤
      description: |
        我们需要执行哪些操作才能让 bug 出现？
        简洁清晰的重现步骤能够帮助我们更迅速地定位问题所在。
      placeholder: |
        1. 首先……
        2. 然后……
        3. ……
    validations:
      required: true
  - type: textarea
    id: excepted
    attributes:
      label: 期望的行为
      description: 详细的描述你期望发生的行为，突出与目前（可能不正确的）行为的不同。
  - type: textarea
    id: what-happened
    attributes:
      label: 实际结果
      description: 实际发生的行为。
    validations:
      required: true
  - type: textarea
    id: stacktrace
    attributes:
      label: 堆栈跟踪（可选）
      description: 如果在遇到这个 bug 时发生了崩溃（弹出崩溃提示），或者产生了错误日志，请将产生的堆栈跟踪信息粘贴到此处，便于定位 bug。
      render: shell
  - type: dropdown
    id: app_version
    attributes:
      label: 应用版本
      description: 您当前使用的 ClassIsland 版本。
      options:
        - 最新的预览版
        - 最新的稳定版
        - 最新的预览版（精简版本）
        - 最新的稳定版（精简版本）
      default: 0
    
  - type: markdown
    attributes:
      value: |
        ## 最后一步
        回顾您的 issue：
        - 我认为上述的描述已经足以详细，以允许开发人员能复现该问题。
