name: 功能请求
description: 提出一项新的功能。
labels: ["新功能"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您贡献您的想法。
        请在上面的文本框⬆️起一个能够**清晰概括此功能的标题**，便于开发者了解您的想法。

        > **重要：如果您想要提出多项功能，请为每一个功能开一个单独的issue**
        > 如果您提出的是一份**设计想法**而不是一个单独的**功能**，请在[Discussions](https://github.com/ClassIsland/ClassIsland/discussions)页面发表。
        
        在开始之前，请先检查：
        
        - 我已经在 [Issues](https://github.com/ClassIsland/ClassIsland/issues?q=label%3A新功能) 中找过我要提出的问题，没有找到相同问题的 Issue。
        - 我已经仔细翻找过本应用，确认我想要的功能没有实现。
        - 我已经详细阅读过应用的[帮助文档](https://docs.classisland.tech/zh-cn/latest/app/)，但我想要的功能没有实现。
        - 我已确认我的功能尚未在 [dev](https://github.com/ClassIsland/ClassIsland/commits/dev/) 分支实现。
  - type: textarea
    id: back
    attributes:
      label: 背景与动机
      description: 添加此功能的理由。
    validations:
      required: true
  - type: textarea
    id: req
    attributes:
      label: 想要实现或优化的功能
      description: 详细地描述一下你想要的功能，描述的越具体，采纳的可能性越高。
    validations:
      required: true
