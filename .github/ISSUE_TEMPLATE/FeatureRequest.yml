name: 功能请求
description: 提出一项新的功能。
labels: ["新功能"]
body:
  - type: markdown
    attributes:
      value: |
        1. 感谢您贡献您的想法
        
        👉️ 在上面的文本框⬆️起一个能够**清晰概括此功能的标题**，便于开发者了解您的想法。

        2. 检查您的功能请求：
        
        - 如果您想要提出**多项功能**，请为每一个功能开一个单独的issue。
        - 如果您提出的是一份**设计想法**而不是一个单独的**功能**，请在[Discussions](https://github.com/ClassIsland/ClassIsland/discussions)页面发表。
        
        3. 确认此功能请求没有重复：
        
        - 我已经仔细翻找过本应用，确认我想要的功能没有实现。
        - 我确认 [Issues](https://github.com/ClassIsland/ClassIsland/issues?q=label%3A新功能) 中没有相同的问题。
        - 我阅读过应用的[帮助文档](https://docs.classisland.tech/zh-cn/latest/app/)，但我想要的功能没有实现。
        - 我已确认我的功能尚未在 [dev](https://github.com/ClassIsland/ClassIsland/commits/dev/) 分支实现。
  - type: textarea
    id: back
    attributes:
      label: 背景与动机
      description: 添加此功能的理由。
    validations:
      required: true
  - type: textarea
    id: req
    attributes:
      label: 想要实现或优化的功能
      description: 详细地描述一下你想要的功能，描述的越具体，采纳的可能性越高。
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        最后一步：回顾您的表述。
        👉️ 我认为上述的描述已经足够清晰，以允许开发人员理解您提出的功能。
